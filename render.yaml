# Render Blueprint — Phase 2 API (Docker)
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: huhu-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: HOST
        value: 0.0.0.0
      # Set in Render Dashboard (Neon Postgres); do not commit secrets or SQLite path
      - key: DATABASE_URL
        sync: false
      - key: RATE_LIMIT_BACKEND
        sync: false
      - key: STORE_PUBLIC_SITE_URL
        value: https://huhu-app.pages.dev
      - key: LLM_PROVIDER
        value: mock
      - key: EMBEDDING_PROVIDER
        value: mock
      - key: TTS_PROVIDER
        value: mock
      - key: GOOGLE_PLAY_PACKAGE_NAME
        value: com.ctrlz.huhu
      # Play SA: Secret File google-play-sa.json mounts at /etc/secrets/
      - key: GOOGLE_PLAY_SERVICE_ACCOUNT_PATH
        value: /etc/secrets/google-play-sa.json
      - key: IAP_STRICT
        value: "true"
      - key: JWT_SECRET
        generateValue: true
      # Optional: set in Render Dashboard for persistent data (Neon / Render Postgres)
      # - key: DATABASE_URL
      #   sync: false
