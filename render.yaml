# Render Blueprint — Phase 2 API (Docker)
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: huhu-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: HOST
        value: 0.0.0.0
      - key: DATABASE_URL
        value: file:/app/data/huhu.db
      - key: STORE_PUBLIC_SITE_URL
        value: https://huhu-app.pages.dev
      - key: LLM_PROVIDER
        value: mock
      - key: EMBEDDING_PROVIDER
        value: mock
      - key: TTS_PROVIDER
        value: mock
      - key: GOOGLE_PLAY_PACKAGE_NAME
        value: com.ctrlz.huhu
      - key: JWT_SECRET
        generateValue: true
    disk:
      name: huhu-data
      mountPath: /app/data
      sizeGB: 1
